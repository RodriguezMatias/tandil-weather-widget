name: Actualizar clima de Tandil

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-weather
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Traer y parsear realtime.txt
        run: node scripts/build-weather-json.js

      - name: Commitear si cambió
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/weather.json
          git diff --cached --quiet || git commit -m "Actualizar clima de Tandil [skip ci]"
          git push
